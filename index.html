<!DOCTYPE html>
<html>
<head>
  <title>Image Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    h2 {
      text-align: center;
      color: white;
      padding: 20px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      transition: transform 0.4s, box-shadow 0.4s;
    }

    /* Hover effect */
    .gallery img:hover {
      transform: scale(1.07);
      box-shadow: 0 12px 30px rgba(0,0,0,0.5);
    }

    /* Mobile View */
    @media (max-width: 600px) {
      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<h2>🌈 Beautiful Image Gallery</h2>

<div class="gallery">
  <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=600&q=80" />
  <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=600&q=80" />
  <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=600&q=80" />
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=600&q=80" />
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" />
  <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?auto=format&fit=crop&w=600&q=80" />
</div>
